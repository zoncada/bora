version: '3.9'

services:
  bora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bora-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATA_DIR=/app/data
      - JWT_SECRET=dev-secret-key
