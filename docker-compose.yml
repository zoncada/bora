services:
  bora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bora-app
    restart: unless-stopped
    ports:
      - "3005:3000"
    volumes:
      - bora-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-bora-super-secret-change-in-production}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-UUxI4O8-FbRouAevSmBQ6o18hgE4nSG3qwvJTfKc-ls}
      - VIRTUAL_HOST=${DOMAIN:-bora.valenzi.tech}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${DOMAIN:-bora.valenzi.tech}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@valenzi.tech}
    networks:
      - nginx-proxy
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/push/vapid-key"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  bora-data:
    driver: local

networks:
  nginx-proxy:
    external: true
  default:
    driver: bridge
